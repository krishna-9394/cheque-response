<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Cheque Entry</title>
    <style>
        #ledgerSelect {
            width: 500px;
            max-width: 90vw;
        }

        #ledgerList option {
            white-space: normal;
            word-wrap: break-word;
        }
    </style>
</head>

<body>

    <h2>Cheque Entry</h2>

    <label>Reference Cheque Date</label><br>
    <input type="date" id="refDate"><br><br>

    <label>Cheque Number</label><br>
    <input type="text" id="chequeNo"><br><br>

    <label>Amount</label><br>
    <input type="number" id="amount"><br><br>

    <label>Name of Ledger</label><br>
    <input type="text" id="ledgerSelect" list="ledgerList" autocomplete="off"><br>
    <datalist id="ledgerList"></datalist><br><br>

    <button onclick="addEntry()">Submit</button>
    <button onclick="downloadCSV()">Download response.csv</button>

    <h3>Response Data</h3>
    <div id="tableContainer"></div>

    <script src="app.js"></script>
</body>

</html>
